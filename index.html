<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANITA OLSHOP - Toko Member</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #ffeef8 0%, #fff1f7 50%, #fce4ec 100%);
            min-height: 100vh; color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { 
            color: #e91e63; font-size: 2.5em; 
            text-shadow: 2px 2px 4px rgba(233,30,99,0.3); margin-bottom: 10px;
        }
        .btn {
            background: linear-gradient(45deg, #e91e63, #f06292); color: white;
            border: none; padding: 15px 25px; border-radius: 25px;
            cursor: pointer; font-size: 16px; font-weight: bold;
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(233,30,99,0.3);
            width: 100%; margin: 10px 0;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233,30,99,0.4); }
        .btn-secondary { background: linear-gradient(45deg, #f8bbd9, #ffc1e3); color: #e91e63; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #e91e63; }
        .form-group input { 
            width: 100%; padding: 15px; border: 2px solid #f8bbd9; 
            border-radius: 25px; font-size: 16px; transition: border-color 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #e91e63; box-shadow: 0 0 10px rgba(233,30,99,0.2); }
        .auth-container { 
            max-width: 400px; margin: 50px auto; background: white; 
            padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(233,30,99,0.2);
        }
        .tabs { display: flex; margin-bottom: 30px; background: #f8bbd9; border-radius: 25px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .tab-btn.active { background: #e91e63; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 30px; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(233,30,99,0.15); }
        #qrcode { margin: 20px 0; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .members-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .members-table th, .members-table td { padding: 15px; text-align: left; border-bottom: 1px solid #f8bbd9; }
        .members-table th { background: linear-gradient(45deg, #e91e63, #f06292); color: white; font-weight: bold; }
        .members-table tr:hover { background: #fff3e0; }
        .coin-display { font-size: 3em; color: #e91e63; font-weight: bold; text-align: center; margin: 30px 0; }
        .search-container { position: sticky; top: 20px; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 5px 15px rgba(233,30,99,0.15); margin-bottom: 30px; }
        .success-message { background: #d4edda; color: #155724; padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px solid #c3e6cb; text-align: center; font-weight: bold; }
        .hidden { display: none !important; }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } .header h1 { font-size: 2em; } }
    </style>
</head>
<body>

<!-- AUTH MODAL -->
<div id="authModal">
    <div class="container">
        <div class="auth-container">
            <h2 style="color: #e91e63; margin-bottom: 30px; text-align: center;">👋 Selamat Datang!</h2>
            <div class="tabs">
                <button class="tab-btn active" id="buyerTabBtn">🛒 Pembeli</button>
                <button class="tab-btn" id="ownerTabBtn">👑 Pemilik</button>
            </div>
            
            <!-- BUYER FORM -->
            <div id="buyerTab" class="tab-content active">
                <form id="buyerForm">
                    <div class="form-group">
                        <label>👤 Nama Lengkap</label>
                        <input type="text" id="buyerName" placeholder="Masukkan nama lengkap" required>
                    </div>
                    <div class="form-group">
                        <label>📱 No. HP (08xxxxxxxxx)</label>
                        <input type="tel" id="buyerPhone" placeholder="081234567890" required>
                    </div>
                    <button type="submit" class="btn">🚀 DAFTAR / MASUK</button>
                </form>
            </div>

            <!-- OWNER FORM -->
            <div id="ownerTab" class="tab-content">
                <form id="ownerForm">
                    <div class="form-group">
                        <label>👑 Username</label>
                        <input type="text" id="ownerUsername" placeholder="kanita" required>
                    </div>
                    <div class="form-group">
                        <label>🔐 Password</label>
                        <input type="password" id="ownerPassword" placeholder="kanita2024" required>
                    </div>
                    <button type="submit" class="btn">🔓 MASUK PEMILIK</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- MAIN PAGE -->
<div id="mainPage" class="hidden">
    <div class="container">
        <div class="header">
            <h1>🛍️ KANITA OLSHOP</h1>
            <p style="font-size: 1.2em; color: #666;">Toko Member Terpercaya</p>
            <button class="btn btn-secondary" onclick="showAuth()" style="width: auto; padding: 15px 40px; font-size: 18px; display: inline-block;">
                📱 Login / Daftar
            </button>
        </div>
    </div>
</div>

<!-- OWNER DASHBOARD -->
<div id="ownerDashboard" class="hidden">
    <div class="container">
        <div class="header">
            <h1>👑 DASHBOARD PEMILIK</h1>
            <button class="btn btn-secondary" onclick="logout()" style="float: right; width: auto; padding: 12px 24px;">🚪 Keluar</button>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3 style="color: #e91e63;">📱 QR Code Login</h3>
                <div style="text-align: center;">
                    <canvas id="qrcodeCanvas" width="200" height="200"></canvas>
                    <p style="color: #666; margin-top: 15px;">Bagikan ke pembeli</p>
                </div>
            </div>

            <div class="card search-container">
                <h3 style="color: #e91e63;">🔍 Cari Anggota</h3>
                <input type="tel" id="searchPhone" placeholder="08xxxxxxxxx" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #f8bbd9; border-radius: 20px;">
                <button class="btn" onclick="searchMember()">🔎 Cari</button>
                
                <div id="conversionForm" class="hidden" style="margin-top: 20px;">
                    <div class="success-message" id="memberFound"></div>
                    <div class="form-group">
                        <label>💰 Nominal (Rp)</label>
                        <input type="number" id="amountRp" placeholder="10000" min="10000">
                    </div>
                    <button class="btn" onclick="convertToCoin()">✨ Tambah Koin</button>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top: 30px;">
            <h3 style="color: #e91e63;">📊 Daftar Anggota</h3>
            <table class="members-table" id="membersTable">
                <thead><tr><th>#</th><th>Nama</th><th>HP</th><th>Koin</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- BUYER DASHBOARD -->
<div id="buyerDashboard" class="hidden">
    <div class="container">
        <div class="header">
            <h1>💖 HALO, <span id="buyerNameDisplay"></span>!</h1>
            <button class="btn btn-secondary" onclick="logout()" style="float: right; width: auto; padding: 12px 24px;">🚪 Keluar</button>
        </div>
        
        <div class="card" style="max-width: 500px; margin: 30px auto;">
            <h2 style="color: #e91e63; text-align: center;">💎 Saldo Koin</h2>
            <div class="coin-display" id="buyerCoins">0 Koin ✨</div>
        </div>
    </div>
</div>

<script>
    // GLOBAL VARIABLES
    let members = JSON.parse(localStorage.getItem('kanitaMembers')) || [];
    let currentUser = null;
    const OWNER_PASSWORD = 'kanita2024';

    // PAGE CONTROL FUNCTIONS
    function showPage(pageId) {
        // Hide all pages
        document.querySelectorAll('#authModal, #mainPage, #ownerDashboard, #buyerDashboard').forEach(page => {
            page.classList.add('hidden');
        });
        // Show target page
        document.getElementById(pageId).classList.remove('hidden');
    }

    function showAuth() { showPage('authModal'); }
    function showMainPage() { showPage('mainPage'); }
    function showOwnerDashboard() { showPage('ownerDashboard'); initQR(); updateMembersTable(); }
    function showBuyerDashboard() { 
        showPage('buyerDashboard'); 
        document.getElementById('buyerNameDisplay').textContent = currentUser.name;
        document.getElementById('buyerCoins').textContent = currentUser.coins + ' Koin ✨';
    }

    // TAB SWITCHING
    document.getElementById('buyerTabBtn').onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('buyerTab').classList.add('active');
    };

    document.getElementById('ownerTabBtn').onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('ownerTab').classList.add('active');
    };

    // BUYER FORM - 100% FIXED
    document.getElementById('buyerForm').onsubmit = function(e) {
        e.preventDefault();
        const name = document.getElementById('buyerName').value.trim();
        const phone = document.getElementById('buyerPhone').value.trim();

        if (!name || !phone) {
            alert('❌ Isi nama dan nomor HP!');
            return;
        }

        let member = members.find(m => m.phone === phone);
        if (!member) {
            member = { id: Date.now(), name, phone, coins: 0, loginCount: 1 };
            members.push(member);
        } else {
            member.loginCount++;
        }

        localStorage.setItem('kanitaMembers', JSON.stringify(members));
        currentUser = member;
        alert('✅ Login berhasil! Selamat datang ' + name);
        showBuyerDashboard();
    };

    // OWNER FORM - 100% FIXED
    document.getElementById('ownerForm').onsubmit = function(e) {
        e.preventDefault();
        const username = document.getElementById('ownerUsername').value.trim();
        const password = document.getElementById('ownerPassword').value;

        if (username === 'kanita' && password === OWNER_PASSWORD) {
            currentUser = { role: 'owner' };
            alert('✅ Login pemilik berhasil!');
            showOwnerDashboard();
        } else {
            alert('❌ Salah!\nUsername: kanita\nPassword: kanita2024');
        }
    };

    // OWNER FUNCTIONS
    function initQR() {
        QRCode.toCanvas(document.getElementById('qrcodeCanvas'), window.location.href, {
            width: 200, color: { dark: '#e91e63', light: '#fff' }
        });
    }

    function updateMembersTable() {
        const tbody = document.querySelector('#membersTable tbody');
        const sorted = [...members].sort((a, b) => b.coins - a.coins);
        tbody.innerHTML = sorted.map((m, i) => 
            `<tr><td>${i+1}</td><td>${m.name}</td><td>${m.phone}</td><td style="color:#e91e63;font-weight:bold;">${m.coins}</td></tr>`
        ).join('');
    }

    function searchMember() {
        const phone = document.getElementById('searchPhone').value.trim();
        const member = members.find(m => m.phone === phone);
        if (member) {
            document.getElementById('memberFound').innerHTML = `✅ ${member.name}<br>${member.phone}<br>${member.coins} Koin`;
            document.getElementById('conversionForm').classList.remove('hidden');
            window.currentMember = member;
        } else {
            alert('❌ Anggota tidak ditemukan!');
        }
    }

    function convertToCoin() {
        const amount = parseInt(document.getElementById('amountRp').value);
        if (amount >= 10000) {
            const coins = Math.floor(amount / 1000);
            window.currentMember.coins += coins;
            localStorage.setItem('kanitaMembers', JSON.stringify(members));
            alert(`✅ +${coins} koin untuk ${window.currentMember.name}`);
            updateMembersTable();
            document.getElementById('conversionForm').classList.add('hidden');
        } else {
            alert('❌ Minimal Rp 10.000!');
        }
    }

    function logout() {
        currentUser = null;
        document.getElementById('buyerName').value = '';
        document.getElementById('buyerPhone').value = '';
        document.getElementById('ownerUsername').value = '';
        document.getElementById('ownerPassword').value = '';
        showMainPage();
    }

    // START APP
    showMainPage();
    console.log('✅ KANITA OLSHOP READY!');
</script>
</body>
</html>
